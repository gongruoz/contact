<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Motion Simplex</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    canvas#gl {
      display: block; width: 100%; height: 100%;
      position: fixed; top: 0; left: 0; z-index: 0;
      touch-action: none;
    }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    #ui > * { pointer-events: auto; }
    #hint {
      font-size: 0.95rem; opacity: 0.45; letter-spacing: 0.05em;
      transition: opacity 0.8s;
    }
    #connect-area {
      margin-top: 2rem; display: flex; flex-direction: column;
      align-items: center; gap: 0.75rem;
    }
    button {
      background: rgba(0,0,0,0.04); color: #444;
      border: 1px solid rgba(0,0,0,0.15); border-radius: 6px;
      padding: 0.5rem 1.5rem; font-size: 0.9rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(0,0,0,0.08); }
    input#room-input {
      background: rgba(0,0,0,0.03); color: #333; text-align: center;
      border: 1px solid rgba(0,0,0,0.15); border-radius: 6px;
      padding: 0.5rem 1rem; font-size: 1.2rem; width: 8rem;
      letter-spacing: 0.3em; outline: none;
    }
    input#room-input::placeholder { color: rgba(0,0,0,0.25); }
    #room-code {
      font-size: 2rem; letter-spacing: 0.4em; font-weight: 300;
      opacity: 0.8; user-select: all; color: #222;
    }
    #status {
      font-size: 0.8rem; opacity: 0.4; margin-top: 0.5rem;
      max-width: min(90vw, 22rem);
      text-align: center;
      line-height: 1.35;
    }
    #status.peer-error { opacity: 0.85; color: #522; }
    #status.peer-error-detail { font-size: 0.68rem; opacity: 0.65; margin-top: 0.35rem; white-space: pre-wrap; word-break: break-word; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="ui">
    <div id="hint">move your phone</div>
    <div id="connect-area">
      <button id="btn-create">create room</button>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <input id="room-input" maxlength="4" placeholder="code" />
        <button id="btn-join">join</button>
      </div>
      <div id="room-code" class="hidden"></div>
      <div id="status-wrap">
        <div id="status"></div>
        <div id="status-detail" class="hidden peer-error-detail"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
