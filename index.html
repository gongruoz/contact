<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>运动接触</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #fff;
      font-family: "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    canvas#gl {
      display: block; width: 100%; height: 100%;
      position: fixed; top: 0; left: 0; z-index: 0;
      touch-action: none;
    }
    #ui {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none; color: #333;
    }
    #ui .interactive { pointer-events: auto; }
    /* 文案固定在上下，避开画面中央的 simplex */
    #hint {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 22rem);
      text-align: center;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      opacity: 0.5;
      line-height: 1.45;
      transition: opacity 0.8s;
    }
    #connect-area {
      position: fixed;
      bottom: max(1.25rem, env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 22rem);
      display: flex; flex-direction: column;
      align-items: center; gap: 0.65rem;
    }
    button {
      font-family: inherit; font-weight: 300;
      background: rgba(0,0,0,0.04); color: #333;
      border: 1px solid rgba(0,0,0,0.12); border-radius: 6px;
      padding: 0.45rem 1.35rem; font-size: 0.88rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(0,0,0,0.07); }
    input#room-input {
      font-family: inherit; font-weight: 300;
      background: rgba(0,0,0,0.03); color: #333; text-align: center;
      border: 1px solid rgba(0,0,0,0.12); border-radius: 6px;
      padding: 0.45rem 0.85rem; font-size: 1.05rem; width: 7.5rem;
      letter-spacing: 0.28em; outline: none;
    }
    input#room-input::placeholder { color: rgba(0,0,0,0.22); font-weight: 300; }
    #room-code {
      font-size: 1.65rem; letter-spacing: 0.35em; font-weight: 300;
      opacity: 0.75; user-select: all; color: #222;
    }
    #status-wrap {
      text-align: center;
      max-width: min(90vw, 22rem);
    }
    #status {
      font-size: 0.75rem; font-weight: 300;
      opacity: 0.45; margin-top: 0.25rem;
      line-height: 1.4;
    }
    #status.peer-error { opacity: 0.88; color: #522; }
    #status-detail.peer-error-detail {
      font-size: 0.65rem; font-weight: 300;
      opacity: 0.62; margin-top: 0.3rem;
      white-space: pre-wrap; word-break: break-word;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="ui">
    <div id="hint" class="interactive">移动鼠标</div>
    <div id="connect-area" class="interactive">
      <button id="btn-create" type="button">创建房间</button>
      <div style="display:flex;gap:0.45rem;align-items:center;">
        <input id="room-input" maxlength="4" placeholder="房间码" inputmode="text" autocomplete="off" />
        <button id="btn-join" type="button">加入</button>
      </div>
      <div id="room-code" class="hidden"></div>
      <div id="status-wrap">
        <div id="status"></div>
        <div id="status-detail" class="hidden peer-error-detail"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
