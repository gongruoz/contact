<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Contact</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #fff;
      font-family: "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 3.4vw, 15px);
      letter-spacing: 0.06em;
      -webkit-font-smoothing: antialiased;
    }
    canvas#gl {
      display: block; width: 100%; height: 100%;
      position: fixed; top: 0; left: 0; z-index: 0;
      touch-action: none;
    }
    #ui {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none; color: #333;
    }
    #ui .interactive { pointer-events: auto; }

    #hint {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      width: min(92vw, 22rem);
      text-align: center;
      font-size: inherit;
      font-weight: 300;
      letter-spacing: inherit;
      opacity: 0.5;
      line-height: 1.45;
      transition: opacity 0.8s;
    }

    #connect-area {
      position: fixed;
      bottom: max(1.5rem, env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      width: min(96vw, 26rem);
      display: flex; flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #tagline {
      font-size: inherit;
      font-weight: 300;
      letter-spacing: inherit;
      color: #555;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 1.75rem;
      width: 100%;
      padding: 0 0.25rem;
    }

    #tagline .tagline-line1 {
      display: block;
      white-space: nowrap;
    }

    #tagline .tagline-line2 {
      display: block;
      margin-top: 0.35em;
    }

    .ui-btn {
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      font-weight: 300;
      font-size: inherit;
      letter-spacing: inherit;
      background: #fff;
      color: #333;
      border: 1px solid rgba(0,0,0,0.22);
      border-radius: 0;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .ui-btn:hover {
      background: #fafafa;
      border-color: rgba(0,0,0,0.32);
    }

    #btn-create, #btn-exit {
      width: 100%;
      max-width: 18rem;
    }

    #btn-exit {
      margin-top: 0.25rem;
    }

    .join-row {
      display: flex;
      align-items: stretch;
      width: 100%;
      max-width: 18rem;
      gap: 0;
    }

    .join-row .ui-field {
      flex: 1 1 50%;
      min-width: 0;
    }

    .ui-field {
      font-family: inherit;
      font-weight: 300;
      font-size: inherit;
      letter-spacing: inherit;
      background: #fff;
      color: #333;
      border: 1px solid rgba(0,0,0,0.22);
      border-radius: 0;
      padding: 0.55rem 0.85rem;
      text-align: center;
      outline: none;
    }

    .join-row .ui-field:first-child {
      border-right: none;
    }
    .join-row .ui-field:last-child {
      border-left: 1px solid rgba(0,0,0,0.22);
    }

    .ui-field::placeholder {
      color: rgba(0,0,0,0.35);
      font-weight: 300;
      letter-spacing: inherit;
    }

    #room-code {
      font-size: inherit;
      font-weight: 300;
      letter-spacing: inherit;
      opacity: 0.8;
      user-select: all;
      color: #222;
      text-align: center;
      width: 100%;
      max-width: 18rem;
      padding: 0.55rem 0.85rem;
      border: 1px solid rgba(0,0,0,0.22);
      background: #fff;
    }

    #status-wrap { text-align: center; max-width: min(90vw, 22rem); }
    #status {
      font-size: inherit;
      font-weight: 300;
      letter-spacing: inherit;
      opacity: 0.45;
      margin-top: 0.15rem;
      line-height: 1.45;
    }
    #status.disconnected-fade {
      transition: opacity 2.8s ease-out;
    }
    #status.peer-error { opacity: 0.88; color: #522; }
    #status-detail.peer-error-detail {
      font-size: inherit;
      font-weight: 300;
      letter-spacing: inherit;
      opacity: 0.62;
      margin-top: 0.25rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .hidden { display: none !important; }

    #figure-toolbar {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top, 0px));
      right: max(0.75rem, env(safe-area-inset-right, 0px));
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35rem;
      max-width: min(96vw, 20rem);
    }
    #figure-toolbar .figure-toolbar__seg {
      display: inline-flex;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
    }
    #figure-toolbar .figure-toolbar__btn {
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      font-weight: 300;
      font-size: 0.82em;
      letter-spacing: inherit;
      padding: 0.38rem 0.55rem;
      border: none;
      background: #fff;
      color: #666;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #figure-toolbar .figure-toolbar__btn:hover {
      background: #fafafa;
      color: #333;
    }
    #figure-toolbar .figure-toolbar__btn--active {
      background: rgba(0,0,0,0.06);
      color: #222;
    }
    #figure-toolbar .figure-toolbar__btn + .figure-toolbar__btn {
      border-left: 1px solid rgba(0,0,0,0.14);
    }
    #figure-toolbar #btn-trail.figure-toolbar__btn {
      border: 1px solid rgba(0,0,0,0.2);
      min-width: 4.6rem;
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="ui">
    <div id="hint" class="interactive">move your mouse — make it dance</div>
    <div id="figure-toolbar" class="interactive">
      <div class="figure-toolbar__seg" role="group" aria-label="figure">
        <button type="button" id="btn-mode-shape" class="figure-toolbar__btn figure-toolbar__btn--active">shape</button>
        <button type="button" id="btn-mode-body" class="figure-toolbar__btn">body</button>
      </div>
      <button type="button" id="btn-trail" class="figure-toolbar__btn">trail off</button>
    </div>
    <div id="connect-area" class="interactive">
      <div id="tagline"><span class="tagline-line1">show how you move · feel how they move</span><span class="tagline-line2">sync up to make contact</span></div>
      <div id="connect-controls">
        <button id="btn-create" class="ui-btn" type="button">create room</button>
        <div class="join-row">
          <input id="room-input" class="ui-field" maxlength="4" placeholder="code" inputmode="text" autocomplete="off" />
          <button id="btn-join" class="ui-btn ui-field" type="button">join</button>
        </div>
        <div id="room-code" class="hidden"></div>
        <div id="status-wrap">
          <div id="status"></div>
          <div id="status-detail" class="hidden peer-error-detail"></div>
        </div>
      </div>
      <button id="btn-exit" class="ui-btn hidden" type="button">exit</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
